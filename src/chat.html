<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>OpenChat - Chat with anyone, anywhere!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <style>
        body {
            background-color: #f8f8f8;
            font-family: Arial, sans-serif;
            font-size: 16px;
        }

        h1 {
            margin-top: 50px;
            margin-bottom: 30px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="text"] {
            display: block;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
        }

        button[type="button"] {
            background-color: #428bca;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }

        button[type="button"]:hover {
            background-color: #3071a9;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 5px;
            padding: 20px;
        }

        h2 {
            font-size: 24px;
            margin-top: 0;
        }

        textarea {
            display: block;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
            height: 300px;
            resize: none;
        }

        /* Add this to your stylesheet */
        .join-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .join-container input {
            margin-right: 10px;
            height: 30px;
            border-radius: 4px;
            border: 1px solid #ccc;
            padding: 0 10px;
            flex: 1;
        }

        .join-container button {
            height: 30px;
            border: none;
            border-radius: 4px;
            background-color: #2196f3;
            color: #fff;
            padding: 0 10px;
            margin-bottom: 16px;
        }

        #input-container {
            display: flex;
            align-items: center;
        }

        #input {
            flex-grow: 1;
            margin-right: 10px;
        }

        #clear-chat {
            display: inline-block;
            background-color: red;
            border: none;
            color: white;
            margin-bottom: 17px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #clear-chat:hover {
            background-color: #cc0000;
        }

        #join-chat:disabled {
            background-color: #ccc;
            color: #999;
            cursor: not-allowed;
        }

        #chat {
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            resize: none;
            overflow-y: auto;
            margin-top: 20px;
            width: 100%;
            height: 400px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <h1>Welcome to OpenChat!</h1>

    <div class="chat-container">
        <div class="join-container">
            <input id="username" type="text" placeholder="Username">
            <button id="join-chat" type="button">Join</button>
        </div>

        <h2>Chat</h2>
        <textarea id="chat" readonly></textarea>
        <div id="input-container">
            <input id="input" style="display:block; width:600px; box-sizing: border-box" type="text"
                placeholder="Type your message and Enter to send...">
            <button id="clear-chat" type="button">Clear</button>
        </div>
    </div>

    <script>
        const username = document.querySelector("#username");
        const join_btn = document.querySelector("#join-chat");
        const textarea = document.querySelector("#chat");
        const input = document.querySelector("#input");

        const clear_btn = document.querySelector("#clear-chat");

        window.onload = function () {
            username.value = "";
            input.value = "";
            textarea.value = "";
        }

        clear_btn.addEventListener("click", function (e) {
            textarea.value = "";
        });

        join_btn.addEventListener("click", function (e) {
            this.disabled = true;

            const websocket = new WebSocket("ws://localhost:3000/websocket");

            websocket.onopen = function () {
                console.log("connection opened");
                websocket.send(username.value);
                join_btn.disabled = true; // disable the Join button once the user has joined
                username.readOnly = true;
            }

            const btn = this;

            websocket.onclose = function () {
                console.log("connection closed");
                btn.disabled = false;
            }

            websocket.onmessage = function (e) {
                console.log("received message: " + e.data);
                textarea.value += e.data + "\n"; // append the new message to the existing content of the chat area
                textarea.scrollTop = textarea.scrollHeight; // scroll to the bottom of the chat area
            }

            input.onkeydown = function (e) {
                if (e.key == "Enter") {
                    websocket.send(input.value);
                    input.value = "";
                }
            }
        });
    </script>
</body>
